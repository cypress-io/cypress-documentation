version: 2.1

orbs:
  cypress: cypress-io/cypress@4

executors:
  node-executor:
    resource_class: medium+
    docker:
      - image: cimg/node:22.15.1

commands:
  docs-build:
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install Dependencies
          command: npm ci
      - save_cache:
          key: npm-cache-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Docs Build
          command: npm run build


job-defaults: &job-defaults
  executor: node-executor
  working_directory: ~/repo

jobs:
  build:
    <<: *job-defaults
    steps:
      - docs-build
      - persist_to_workspace:
          root: ~/repo
          paths:
            - dist/*
            - node_modules/*

  lint:
    <<: *job-defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - run: npm run lint

  install-and-persist:
    executor:
      name: cypress/default
      node-version: 22.15.1
    resource_class: medium+
    steps:
      - checkout
      # Reuse node_modules across runs.
      - restore_cache:
          keys:
            - npm-cache-project-{{ checksum "package-lock.json" }}
      # Reuse the downloaded Cypress binary across runs. ~/.cache/Cypress is an
      # absolute path, so this cache is shared consistently by every job/run.
      - restore_cache:
          keys:
            - cypress-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install Dependencies
          command: npm ci
      # postinstall is overridden to patch-package, so npm ci does NOT download
      # the Cypress binary. Fetch it explicitly (no-op on a cache hit).
      - run:
          name: Install Cypress binary
          command: npx cypress install
      - save_cache:
          key: npm-cache-project-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - save_cache:
          key: cypress-cache-{{ checksum "package-lock.json" }}
          paths:
            - ~/.cache/Cypress
      # Build the static site once so the tests run against the production
      # build (served statically) instead of the dev server.
      - run:
          name: Build site for tests
          command: npm run build
      - persist_to_workspace:
          root: ~/
          paths:
            - .cache/Cypress
            - project

  run-tests-in-parallel:
    executor:
      name: cypress/default
      node-version: 22.15.1
    resource_class: large
    parallelism: 6
    steps:
      - checkout
      - attach_workspace:
          at: ~/
      - cypress/run-tests:
          # Serve the prebuilt static site (dist/) rather than the dev server.
          # docusaurus serve avoids per-route on-demand compilation, so the
          # ~315 page visits load far faster.
          start-command: 'npm run serve'
          cypress-command: 'npx wait-on http://localhost:3000 && npx cypress run --parallel --record'

  release:
    <<: *job-defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - setup_remote_docker
      - run:
          name: Algolia Scraper
          command: |
            echo "Scraping..."
            ls
            node ./scripts/search/scrape-and-compare-algolia-index.mjs

workflows:
  build-and-test:
    jobs:
      - build
      - lint:
          name: "Lint JS/CSS/Markdown"
          requires:
            - build
      - install-and-persist:
          name: Install & Persist To Workspace
      - run-tests-in-parallel:
          name: Run Tests in Parallel
          requires:
            - Install & Persist To Workspace
      # Run Algolia scraper only on main.
      - release:
          name: 'Run Algolia scraper'
          requires:
            - build
          filters:
            branches:
              only:
                - main
